name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            libxdo-dev \
            wget \
            file \
            desktop-file-utils \
            libfuse2

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm

      - name: Install AppImage tools
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          sudo mv appimagetool-x86_64.AppImage /usr/local/bin/appimagetool

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install Node dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri:build -- --bundles all

      - name: Build .deb package
        run: |
          cd src-tauri
          cargo deb --no-build
          cd ..

      - name: Build .rpm package
        run: |
          cd src-tauri
          cargo generate-rpm --no-build
          cd ..

      - name: List build artifacts
        run: |
          find src-tauri/target/release/bundle -type f || true
          find src-tauri/target/debian -type f || true
          find src-tauri/target/generate-rpm -type f || true

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ouija-pad-deb
          path: src-tauri/target/debian/*.deb

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ouija-pad-rpm
          path: src-tauri/target/generate-rpm/*.rpm

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ouija-pad-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  create-release:
    needs: build-linux
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/ouija-pad-deb/*.deb
            artifacts/ouija-pad-rpm/*.rpm
            artifacts/ouija-pad-appimage/*.AppImage
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
